<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">

  <title>ShadowLink</title>

  <link rel="stylesheet" href="popup.css">

</head>

<body>

  <div class="container">

    <h1>ShadowLink</h1>

    <div class="status">
      Protection Active
    </div>

    <!-- Current Site -->

    <div class="card">

      <div class="label">
        Current Site
      </div>

      <div id="site">
        Loading...
      </div>

    </div>

    <!-- Threat Level -->

    <div class="card">

      <div class="label">
        Threat Level
      </div>

      <div id="threatLevel">
        Safe
      </div>

    </div>

    <!-- Risk Score -->

    <div class="card">

      <div class="label">
        Risk Score
      </div>

      <div id="riskScore">
        0
      </div>

    </div>

    <!-- Indicators -->

    <div class="card">

      <div class="label">
        Indicators
      </div>

      <div id="indicators">
        None
      </div>

    </div>

    <!-- Threat Breakdown -->

    <div class="card">

      <div class="label">
        Threat Breakdown
      </div>

      <div id="breakdown">
        None
      </div>

    </div>

    <!-- Captured Evidence -->

    <div class="card">

      <div class="label">
        Captured Evidence
      </div>

      <div id="screenshots">
        No screenshots captured.
      </div>

    </div>

    <!-- Recent Threats -->

    <div class="card">

      <div class="label">
        Recent Threats
      </div>

      <div id="history">
        No threats detected.
      </div>

    </div>

  </div>

  <script src="popup.js"></script>

</body>

</html>
